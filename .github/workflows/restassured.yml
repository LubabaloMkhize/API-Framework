name: API-Framework Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests with Maven
        run: mvn clean test
        continue-on-error: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Compress Allure Report
        if: always()
        run: zip -r allure-report.zip allure-report

      - name: Send Email with Report
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          # SMTP server details (Example for Gmail)
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Test Execution Report: ${{ github.repository }} - Run #${{ github.run_number }}"
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "GitHub Actions Automation"
          secure: true
          body: |
            Hello,

            The API test suite execution has completed.
            
            Status: ${{ job.status }}
            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Please find the generated Allure Report attached to this email.
          attachments: allure-report.zip

      - name: Upload Allure Report as Artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: allure-report
          path: allure-report
